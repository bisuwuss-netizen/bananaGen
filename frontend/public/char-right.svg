  <!-- Pot rim -->
  <rect x="160" y="230" width="40" height="8" rx="3" fill="#d4894a" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Pot body -->
  <path d="M163,238 L197,238 L193,268 L167,268Z" fill="#c47840" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M170,250 L190,250" stroke="#b36830" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
