  <path d="M194,160 L191,172" stroke="#7aad6a" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Branch + Leaf pair 3 (smaller) -->
  <path d="M178,156 L170,148" stroke="#4a7a50" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M170,148 C166,142 164,134 168,130 C172,128 174,136 172,144Z"
