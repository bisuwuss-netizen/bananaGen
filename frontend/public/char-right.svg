  <circle cx="62" cy="54" r="3.5" fill="#1a1a1a"/>
  <circle cx="84" cy="54" r="3.5" fill="#1a1a1a"/>
  <circle cx="63.5" cy="52.5" r="1.2" fill="white" opacity="0.65"/>
  <circle cx="85.5" cy="52.5" r="1.2" fill="white" opacity="0.65"/>
